spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  application:
    name: ecommerce-backend
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
server:
  port: ${PORT:8081}
jwt:
  signerKey: ${JWT_SECRET}
logging:
  level:
    org:
      springframework:
        security: DEBUG
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql: TRACE
